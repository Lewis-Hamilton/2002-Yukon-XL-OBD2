<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBD Controls</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 1.5rem; }
  h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; color: #fff; }
  .card { background: #2a2a2a; border: 0.5px solid #444; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
  .card h2 { font-size: 13px; color: #888; font-weight: 400; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem; }
  .control { display: flex; align-items: center; gap: 12px; margin-bottom: 0.85rem; }
  .control:last-child { margin-bottom: 0; }
  label { font-size: 14px; color: #ccc; min-width: 80px; }
  input[type=range] { flex: 1; accent-color: #7F77DD; }
  .val { font-size: 14px; font-weight: 500; min-width: 52px; text-align: right; color: #fff; }
  select { background: #333; color: #fff; border: 0.5px solid #555; border-radius: 8px; padding: 6px 10px; font-size: 14px; flex: 1; }
  .status { font-size: 13px; color: #888; margin-top: 1rem; }
  .status span { color: #5DCAA5; }
</style>
</head>
<body>
<h1>OBD test controls</h1>

<div class="card">
  <div class="control">
    <label>RPM</label>
    <input type="range" id="rpm" min="0" max="6000" step="50" value="800">
    <span class="val" id="rpm-val">800</span>
  </div>
    <div class="control">
    <label>Speed</label>
    <input type="range" id="speed" min="0" max="120" step="1" value="0">
    <span class="val" id="speed-val">0 mph</span>
  </div>
  <div class="control">
    <label>Load</label>
    <input type="range" id="load" min="0" max="100" step="1" value="5">
    <span class="val" id="load-val">20%</span>
  </div>
  <div class="control">
    <label>Throttle</label>
    <input type="range" id="throttle" min="0" max="100" step="1" value="0">
    <span class="val" id="throttle-val">10%</span>
  </div>
  <div class="control">
    <label>Coolant</label>
    <input type="range" id="coolant" min="32" max="260" step="1" value="195">
    <span class="val" id="coolant-val">195°F</span>
  </div>
</div>

<p class="status" id="status">Waiting...</p>

<script>
const HOST = window.location.origin;

const sliders = [
  { id: 'rpm',      key: 'RPM',                      fmt: v => v },
  { id: 'load',     key: 'Engine Load',               fmt: v => v + '%' },
  { id: 'throttle', key: 'Throttle Position',         fmt: v => v + '%' },
  { id: 'coolant',  key: 'Coolant Temperature',       fmt: v => v + '°F' },
  { id: 'speed',    key: 'Speed',                     fmt: v => v + ' mph' },
];

function send(key, value) {
  fetch(HOST + '/set', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key, value: Number(value) })
  })
  .then(() => {
    const s = document.getElementById('status');
    s.innerHTML = `Last set: <span>${key} → ${value}</span>`;
  })
  .catch(() => {
    document.getElementById('status').textContent = 'Error — is the server running?';
  });
}

sliders.forEach(({ id, key, fmt }) => {
  const input = document.getElementById(id);
  const label = document.getElementById(id + '-val');
  
  function update() {
    label.textContent = fmt(input.value);
    send(key, input.value);
  }

  input.addEventListener('input', update);
  update(); // fire immediately on load
});

document.getElementById('gear').addEventListener('change', e => {
  fetch(HOST + '/set', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key: 'Estimated Gear', value: e.target.value })
  });
});
</script>
</body>
</html>
